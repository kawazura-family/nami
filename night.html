<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>よるのじゅんび</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
      background: #E8EAF6;
      color: #333;
      min-height: 100vh;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .back-btn {
      font-size: 18px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 12px;
      min-width: 48px;
      min-height: 48px;
    }
    .back-btn:active { background: #C5CAE9; }
    .header h1 {
      font-size: 28px;
      color: #5C6BC0;
    }
    .columns {
      display: flex;
      gap: 28px;
      max-width: 740px;
      margin: 0 auto;
    }
    .column {
      flex: 1;
      min-width: 0;
      border-radius: 20px;
      padding: 16px 12px;
    }
    .column.nami {
      border: 3px solid #90CAF9;
      background: rgba(187, 222, 251, 0.2);
    }
    .column.rina {
      border: 3px solid #F48FB1;
      background: rgba(248, 187, 208, 0.2);
    }
    .column-title {
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 12px;
      padding: 8px;
      border-radius: 12px;
    }
    .column.nami .column-title {
      background: #BBDEFB;
      color: #1565C0;
    }
    .column.rina .column-title {
      background: #F8BBD0;
      color: #C2185B;
    }
    .checklist {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .checklist li {
      background: white;
      border-radius: 14px;
      padding: 12px 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 17px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: opacity 0.2s;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }
    .checklist li.done {
      opacity: 0.5;
      text-decoration: line-through;
    }
    .checklist li input[type="checkbox"] {
      width: 26px;
      height: 26px;
      flex-shrink: 0;
      cursor: pointer;
    }
    .column.nami .checklist li input[type="checkbox"] {
      accent-color: #1E88E5;
    }
    .column.rina .checklist li input[type="checkbox"] {
      accent-color: #E91E63;
    }
    .reward-area {
      display: none;
      flex-direction: column;
      align-items: center;
      margin-top: 16px;
    }
    .reward-area.show {
      display: flex;
    }
    .complete-msg {
      font-size: 22px;
      margin-bottom: 10px;
    }
    .reward-img {
      width: 100%;
      max-width: 220px;
      border-radius: 14px;
    }
  </style>
</head>
<body>
  <div class="header">
    <button class="back-btn" onclick="location.href='index.html'">◀ もどる</button>
    <h1>🌙 よるのじゅんび</h1>
  </div>
  <div class="columns">
    <div class="column nami">
      <div class="column-title">🐬 なみ</div>
      <ul class="checklist" id="checklist-nami"></ul>
      <div class="reward-area" id="reward-area-nami">
        <div class="complete-msg">🎉 きょうもがんばったね！</div>
        <img id="reward-img-nami" class="reward-img" alt="ごほうび">
      </div>
    </div>
    <div class="column rina">
      <div class="column-title">🌸 りな</div>
      <ul class="checklist" id="checklist-rina"></ul>
      <div class="reward-area" id="reward-area-rina">
        <div class="complete-msg">🎉 きょうもがんばったね！</div>
        <img id="reward-img-rina" class="reward-img" alt="ごほうび">
      </div>
    </div>
  </div>

  <script>
    const TASKS_BY_USER = {
      nami: [
        '🍚 ごはんをたべる',
        '🪥 はをみがく',
        '🎹 ピアノ',
        '🛁 おふろ',
        '📖 おべんきょう',
      ],
      rina: [
        '🍚 ごはんをたべる',
        '🪥 はをみがく',
        '🛁 おふろ',
      ],
    };

    const USERS = ['nami', 'rina'];
    const RANDOM_IMAGES = 10;

    function getTodayStr() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function storageKey(user) {
      return `night_checklist_${user}`;
    }

    function loadState(user) {
      const taskCount = TASKS_BY_USER[user].length;
      try {
        const saved = JSON.parse(localStorage.getItem(storageKey(user)));
        if (saved && saved.date === getTodayStr() && saved.checked.length === taskCount) {
          return saved.checked;
        }
      } catch (e) {}
      return new Array(taskCount).fill(false);
    }

    function saveState(user, checked) {
      localStorage.setItem(storageKey(user), JSON.stringify({
        date: getTodayStr(),
        checked: checked,
      }));
    }

    function renderUser(user) {
      const tasks = TASKS_BY_USER[user];
      const checked = loadState(user);
      const list = document.getElementById(`checklist-${user}`);
      list.innerHTML = '';

      tasks.forEach((task, i) => {
        const li = document.createElement('li');
        if (checked[i]) li.classList.add('done');

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = checked[i];
        cb.addEventListener('change', () => {
          checked[i] = cb.checked;
          saveState(user, checked);
          li.classList.toggle('done', cb.checked);
          updateComplete(user, checked);
        });

        li.addEventListener('click', (e) => {
          if (e.target !== cb) {
            cb.checked = !cb.checked;
            cb.dispatchEvent(new Event('change'));
          }
        });

        const label = document.createElement('span');
        label.textContent = task;

        li.appendChild(cb);
        li.appendChild(label);
        list.appendChild(li);
      });

      updateComplete(user, checked);
    }

    function updateComplete(user, checked) {
      const done = checked.every(Boolean);
      const area = document.getElementById(`reward-area-${user}`);
      const img = document.getElementById(`reward-img-${user}`);
      if (done) {
        if (!img.src || !img.src.includes('images/random/')) {
          const n = Math.floor(Math.random() * RANDOM_IMAGES) + 1;
          img.src = `images/random/${n}.png`;
        }
        area.classList.add('show');
      } else {
        area.classList.remove('show');
        img.removeAttribute('src');
      }
    }

    function renderAll() {
      USERS.forEach(user => renderUser(user));
    }

    // 日付が変わったらリセット
    let lastDate = getTodayStr();
    setInterval(() => {
      const now = getTodayStr();
      if (now !== lastDate) {
        lastDate = now;
        USERS.forEach(user => localStorage.removeItem(storageKey(user)));
        renderAll();
      }
    }, 30000);

    renderAll();
  </script>
</body>
</html>
