<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ごはんタイマー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
      background: #E8F5E9;
      color: #333;
      min-height: 100vh;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .back-btn {
      font-size: 18px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 12px;
      min-width: 48px;
      min-height: 48px;
    }
    .back-btn:active { background: #C8E6C9; }
    .header h1 {
      font-size: 28px;
      color: #43A047;
    }
    .columns {
      display: flex;
      gap: 28px;
      max-width: 740px;
      margin: 0 auto;
    }
    .column {
      flex: 1;
      min-width: 0;
      border-radius: 20px;
      padding: 16px 12px;
    }
    .column.nami {
      border: 3px solid #90CAF9;
      background: rgba(187, 222, 251, 0.2);
    }
    .column.rina {
      border: 3px solid #F48FB1;
      background: rgba(248, 187, 208, 0.2);
    }
    .column-title {
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 16px;
      padding: 8px;
      border-radius: 12px;
    }
    .column.nami .column-title {
      background: #BBDEFB;
      color: #1565C0;
    }
    .column.rina .column-title {
      background: #F8BBD0;
      color: #C2185B;
    }
    .timer-buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 12px;
    }
    .timer-btn {
      width: 90px;
      height: 90px;
      border-radius: 20px;
      border: none;
      font-size: 42px;
      font-weight: bold;
      cursor: pointer;
      color: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      -webkit-user-select: none;
      user-select: none;
    }
    .timer-btn:active {
      transform: scale(0.95);
    }
    .timer-btn.plus {
      background: #43A047;
    }
    .timer-btn.stop {
      background: #757575;
      font-size: 36px;
    }
    .timer-btn.minus {
      background: #E53935;
    }
    .timer-display {
      text-align: center;
      font-size: 48px;
      font-weight: bold;
      font-variant-numeric: tabular-nums;
      padding: 8px 0;
    }
    .timer-display.negative {
      color: #E53935;
    }
    .total-area {
      max-width: 740px;
      margin: 24px auto 0;
      text-align: center;
    }
    .total-label {
      font-size: 20px;
      font-weight: bold;
      color: #43A047;
      margin-bottom: 4px;
    }
    .total-display {
      font-size: 48px;
      font-weight: bold;
      font-variant-numeric: tabular-nums;
    }
    .done-msg {
      display: none;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      color: #43A047;
      margin-top: 6px;
    }
    .done-msg.show {
      display: block;
    }
    #fireworks {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 0;
    }
    .header, .columns, .total-area {
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>
  <canvas id="fireworks"></canvas>
  <div class="header">
    <button class="back-btn" onclick="location.href='index.html'">◀ もどる</button>
    <h1>🍽️ ごはんタイマー</h1>
  </div>
  <div class="columns">
    <div class="column nami">
      <div class="column-title">🐬 なみ</div>
      <div class="timer-buttons">
        <button class="timer-btn plus" onclick="start('nami', 1)">+</button>
        <button class="timer-btn minus" onclick="start('nami', -1)">−</button>
        <button class="timer-btn stop" onclick="stop('nami')">■</button>
      </div>
      <div class="timer-display" id="timer-nami">00:00</div>
      <div class="done-msg" id="done-nami">🙏 ごちそうさまでした</div>
    </div>
    <div class="column rina">
      <div class="column-title">🌸 りな</div>
      <div class="timer-buttons">
        <button class="timer-btn plus" onclick="start('rina', 1)">+</button>
        <button class="timer-btn minus" onclick="start('rina', -1)">−</button>
        <button class="timer-btn stop" onclick="stop('rina')">■</button>
      </div>
      <div class="timer-display" id="timer-rina">00:00</div>
      <div class="done-msg" id="done-rina">🙏 ごちそうさまでした</div>
    </div>
  </div>
  <div class="total-area">
    <div class="total-label">⏱ トータル</div>
    <div class="total-display" id="timer-total">00:00</div>
  </div>

  <script>
    const seconds = { nami: 0, rina: 0 };
    const timers = { nami: null, rina: null };
    const stopCount = { nami: 0, rina: 0 };
    let totalSeconds = 0;
    let totalTimer = null;

    function formatTime(s) {
      const abs = Math.abs(s);
      const mm = String(Math.floor(abs / 60)).padStart(2, '0');
      const ss = String(abs % 60).padStart(2, '0');
      return (s < 0 ? '-' : '') + mm + ':' + ss;
    }

    function updateDisplay(user) {
      const el = document.getElementById(`timer-${user}`);
      el.textContent = formatTime(seconds[user]);
      el.classList.toggle('negative', seconds[user] < 0);
    }

    function startTotal() {
      if (totalTimer) return;
      const el = document.getElementById('timer-total');
      totalTimer = setInterval(() => {
        totalSeconds++;
        el.textContent = formatTime(totalSeconds);
      }, 1000);
    }

    function stopTotal() {
      if (totalTimer) {
        clearInterval(totalTimer);
        totalTimer = null;
      }
    }

    function start(user, direction) {
      clearInterval(timers[user]);
      timers[user] = setInterval(() => {
        seconds[user] += direction;
        updateDisplay(user);
      }, 1000);
      stopCount[user] = 0;
      document.getElementById(`done-${user}`).classList.remove('show');
      stopFireworks();
      startTotal();
    }

    function stop(user) {
      clearInterval(timers[user]);
      timers[user] = null;
      stopCount[user]++;
      if (stopCount[user] >= 2) {
        document.getElementById(`done-${user}`).classList.add('show');
        const diff = Math.abs(seconds[user] - totalSeconds);
        if (diff <= 180) startFireworksFor(3000);
        if (stopCount.nami >= 2 && stopCount.rina >= 2) stopTotal();
      }
    }

    // ===== 花火アニメーション =====
    const fwCanvas = document.getElementById('fireworks');
    const fwCtx = fwCanvas.getContext('2d');
    const FW_BG = 'rgba(232, 245, 233, 0.25)';
    let fwRockets = [];
    let fwParticles = [];
    let fwActive = false;
    let fwAnimId = null;
    let fwLaunchTimer = 0;
    let fwStopAt = 0;

    function fwResize() {
      fwCanvas.width = window.innerWidth;
      fwCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', fwResize);
    fwResize();

    function fwLaunch() {
      const x = fwCanvas.width * (0.15 + Math.random() * 0.7);
      const targetY = fwCanvas.height * (0.02 + Math.random() * 0.18);
      fwRockets.push({
        x, y: fwCanvas.height, targetY,
        vy: -(12 + Math.random() * 3),
        hue: Math.floor(Math.random() * 360),
      });
    }

    function fwExplode(r) {
      const count = 50 + Math.floor(Math.random() * 30);
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 4;
        fwParticles.push({
          x: r.x, y: r.y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1,
          hue: r.hue + Math.floor(Math.random() * 30 - 15),
        });
      }
    }

    function fwTick() {
      fwCtx.fillStyle = FW_BG;
      fwCtx.fillRect(0, 0, fwCanvas.width, fwCanvas.height);

      for (let i = fwRockets.length - 1; i >= 0; i--) {
        const r = fwRockets[i];
        r.x += (Math.random() - 0.5) * 0.3;
        r.y += r.vy;
        r.vy += 0.12;
        fwCtx.beginPath();
        fwCtx.arc(r.x, r.y, 2.5, 0, Math.PI * 2);
        fwCtx.fillStyle = `hsl(${r.hue}, 100%, 75%)`;
        fwCtx.fill();
        if (r.y <= r.targetY || r.vy >= 0) {
          fwExplode(r);
          fwRockets.splice(i, 1);
        }
      }

      for (let i = fwParticles.length - 1; i >= 0; i--) {
        const p = fwParticles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.04;
        p.vx *= 0.99;
        p.vy *= 0.99;
        p.life -= 0.012;
        if (p.life <= 0) { fwParticles.splice(i, 1); continue; }
        fwCtx.beginPath();
        fwCtx.arc(p.x, p.y, 2.2, 0, Math.PI * 2);
        fwCtx.fillStyle = `hsla(${p.hue}, 100%, 65%, ${p.life})`;
        fwCtx.fill();
      }

      if (fwActive && fwStopAt && Date.now() >= fwStopAt) {
        fwActive = false;
      }

      if (fwActive) {
        fwLaunchTimer--;
        if (fwLaunchTimer <= 0) {
          fwLaunch();
          fwLaunchTimer = 25 + Math.floor(Math.random() * 35);
        }
      }

      if (fwActive || fwRockets.length || fwParticles.length) {
        fwAnimId = requestAnimationFrame(fwTick);
      } else {
        fwAnimId = null;
        fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
      }
    }

    function startFireworks() {
      if (fwActive) return;
      fwActive = true;
      fwLaunchTimer = 0;
      if (!fwAnimId) fwTick();
    }

    function startFireworksFor(ms) {
      const now = Date.now();
      fwStopAt = Math.max(fwStopAt, now) + ms;
      startFireworks();
    }

    function stopFireworks() {
      fwActive = false;
      fwStopAt = 0;
    }
  </script>
</body>
</html>
